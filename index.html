<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyxir Core - RoomZyon Launcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>RoomZyon</h1>
        <nav>
            <a href="#links">Launcher</a>
            <a href="#media">RoomZyon Sneaker</a>
            <button id="openModalBtn" class="btn">Info</button>
        </nav>
    </header>

    <main>
        <div id="customModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Lonix Syntax - RoomZyon</h2>
                    <button id="closeModalBtn" class="icon-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <p>Welcome to RoomZyon! RoomZyon is created by Lonix Syntax.</p>
                </div>
            </div>
        </div>

        <section id="links" class="card">
            <h2>Launcher</h2>
            <ul class="link-list">
                <li>
                    <a href="https://roomzyon-calling-edition.onrender.com" target="_blank">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                        RoomZyon - Calling Edition
                    </a>
                </li>
                <li>
                    <a href="https://roomzyon-texting-edition.onrender.com" target="_blank">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                        RoomZyon - Texting Edition
                    </a>
                </li>
            </ul>
        </section>

        <section id="media" class="card">
            <h2>RoomZyon</h2>
            <div class="video-container" id="videoContainer">
                <video id="customVideo" src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
                
                <div class="video-controls">
                    <button id="playPauseBtn" class="icon-btn">
                        <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        <svg id="pauseIcon" style="display:none;" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                    </button>
                    
                    <div class="progress-bar-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    
                    <button id="muteBtn" class="icon-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                    
                    <button id="fullscreenBtn" class="icon-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                    </button>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
